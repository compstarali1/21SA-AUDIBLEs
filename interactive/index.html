<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Visions</title>
    <style>
        /* CORE RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #00000080; /* Fallback */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* GUARANTEED GIF BACKGROUND */
        .gif-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            /* Using ./ ensures it looks in the local folder on GitHub */
            background: url('./bg.gif') no-repeat center center;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(0, 0, 0, 0.4); 
        }

        /* MAIN UI */
        #main-container {
            text-align: center;
            z-index: 10;
            transition: all 0.6s ease;
        }

        h1 {
            color: white;
            font-size: 3rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 0 0 20px #ff2d55;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 3D FROSTED BUTTONS */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .glass-btn {
            width: 340px;
            padding: 22px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: perspective(600px) rotateX(15deg);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-btn:hover {
            transform: perspective(600px) rotateX(0deg) translateY(-10px) scale(1.05);
            border-color: #ff2d55;
            box-shadow: 0 0 40px rgba(255, 45, 85, 0.5);
            background: rgba(255, 45, 85, 0.1);
        }

        /* VIDEO MODAL (90% WIDTH) */
        #video-view {
            display: none;
            position: absolute;
            width: 90%;
            max-width: 1200px;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            z-index: 100;
            flex-direction: column;
            box-shadow: 0 50px 150px rgba(0,0,0,1);
            opacity: 0;
            transform: scale(0.8) perspective(1000px) rotateX(5deg);
            transition: 0.6s ease;
        }

        #video-view.active {
            display: flex;
            opacity: 1;
            transform: scale(1) perspective(1000px) rotateX(0deg);
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .close { font-size: 55px; color: white; cursor: pointer; line-height: 0.5; }
        .close:hover { color: #ff2d55; transform: scale(1.1); }

        video {
            width: 100%;
            height: auto;
            border-radius: 15px;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* PROGRESS BAR / SEEKER */
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff2d55;
            height: 8px;
            border-radius: 5px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: #efefef;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- This div carries your gif -->
    <div class="gif-background"></div>
    <div class="overlay"></div>

    <div id="main-container">
        <h1>My Visions</h1>
        <div class="btn-stack">
            <button class="glass-btn" onclick="playVid('vid1.mp4')">Part One</button>
            <button class="glass-btn" onclick="playVid('vid2.mp4')">Part Two</button>
            <button class="glass-btn" onclick="playVid('vid3.mp4')">Final Act</button>
        </div>
    </div>

    <!-- VIDEO MODAL -->
    <div id="video-view">
        <div class="header">
            <span class="close" onclick="stopVid()">&times;</span>
        </div>
        
        <video id="mainPlayer" playsinline>
            <source id="vidSource" src="" type="video/mp4">
        </video>

        <div class="controls">
            <input type="range" id="seeker" value="0" step="0.1">
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="durationTime">00:00</span>
            </div>
        </div>
    </div>

    <script>
        const view = document.getElementById('video-view');
        const main = document.getElementById('main-container');
        const player = document.getElementById('mainPlayer');
        const source = document.getElementById('vidSource');
        const seeker = document.getElementById('seeker');
        const curTime = document.getElementById('currentTime');
        const durTime = document.getElementById('durationTime');

        function playVid(file) {
            source.src = file;
            player.load();
            
            main.style.opacity = "0";
            setTimeout(() => {
                main.style.display = "none";
                view.style.display = "flex";
                setTimeout(() => {
                    view.classList.add('active');
                    player.play();
                }, 50);
            }, 500);
        }

        function stopVid() {
            player.pause();
            view.classList.remove('active');
            setTimeout(() => {
                view.style.display = "none";
                main.style.display = "block";
                setTimeout(() => main.style.opacity = "1", 50);
            }, 600);
        }

        // Seeker Update logic
        player.onloadedmetadata = function() {
            seeker.max = player.duration;
            durTime.innerText = formatTime(player.duration);
        };

        player.ontimeupdate = function() {
            if (!seeker.matches(':active')) {
                seeker.value = player.currentTime;
            }
            curTime.innerText = formatTime(player.currentTime);
        };

        seeker.oninput = function() {
            player.currentTime = seeker.value;
        };

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        }
    </script>
</body>
</html>
