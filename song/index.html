<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Modern 3D 8-Face Cube</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black; /* Base color for the darkening effect */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        /* Background Image with 0.4 opacity darkening */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.4; /* Set to 0.4 as requested */
            z-index: -1;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.5);
        }

        /* Progress Bar Container */
        .progress-wrapper {
            position: absolute;
            top: 80px;
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar {
            width: 12.5%; 
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .progress-text {
            color: white;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .scene {
            width: 250px;
            height: 250px;
            perspective: 1200px;
            margin-top: 50px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Elastic/Spring transition */
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .face {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 5px;
        }

        /* 8 faces positioned in a circle */
        .f1 { transform: rotateY(0deg) translateZ(301px); background-image: url('1.gif'); }
        .f2 { transform: rotateY(45deg) translateZ(301px); background-image: url('2.jpg'); }
        .f3 { transform: rotateY(90deg) translateZ(301px); background-image: url('3.gif'); }
        .f4 { transform: rotateY(135deg) translateZ(301px); background-image: url('4.gif'); }
        .f5 { transform: rotateY(180deg) translateZ(301px); background-image: url('5.gif'); }
        .f6 { transform: rotateY(225deg) translateZ(301px); background-image: url('6.gif'); }
        .f7 { transform: rotateY(270deg) translateZ(301px); background-image: url('7.gif'); }
        .f8 { transform: rotateY(315deg) translateZ(301px); background-image: url('8.gif'); }

        .instruction {
            position: absolute;
            bottom: 40px;
            color: white;
            opacity: 0.4;
            pointer-events: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <button class="close-btn" onclick="closeSubProgram()">×</button>

    <div class="progress-wrapper">
        <div class="progress-text">Face <span id="faceNum">1</span> / 8</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="scene">
        <div class="cube" id="cube">
            <div class="face f1"></div>
            <div class="face f2"></div>
            <div class="face f3"></div>
            <div class="face f4"></div>
            <div class="face f5"></div>
            <div class="face f6"></div>
            <div class="face f7"></div>
            <div class="face f8"></div>
        </div>
    </div>

    <div class="instruction">Swipe Left or Right</div>

    <script>
        const cube = document.getElementById('cube');
        const progressBar = document.getElementById('progressBar');
        const faceNumDisplay = document.getElementById('faceNum');
        
        let currentStep = 0;
        let startX = 0;
        let isDragging = false;

        const audios = Array.from({ length: 8 }, (_, i) => {
            const a = new Audio(`${i + 1}.mp3`);
            return a;
        });

        function closeSubProgram() {
            window.parent.postMessage('close', '*'); 
            window.close();
            document.body.style.display = 'none'; 
        }

        function updateUI(index) {
            let normalized = ((index % 8) + 8) % 8;
            let faceIndex = normalized + 1;
            progressBar.style.width = `${(faceIndex / 8) * 100}%`;
            faceNumDisplay.innerText = faceIndex;
        }

        function playFaceAudio(index) {
            audios.forEach(a => { a.pause(); a.currentTime = 0; });
            let normalized = ((index % 8) + 8) % 8;
            audios[normalized].play().catch(e => console.log("Audio trigger failed"));
        }

        function rotateCube(direction) {
            if (direction === 'left') currentStep++;
            else currentStep--;
            
            cube.style.transform = `rotateY(${currentStep * -45}deg)`;
            
            playFaceAudio(currentStep);
            updateUI(currentStep);
        }

        const handleStart = (e) => {
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            isDragging = true;
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const diff = startX - endX;

            if (Math.abs(diff) > 50) {
                rotateCube(diff > 0 ? 'left' : 'right');
            }
            isDragging = false;
        };

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchend', handleEnd);

        updateUI(0);

        document.body.addEventListener('click', () => {
            if (audios[0].paused && currentStep === 0) playFaceAudio(0);
        }, { once: true });
    </script>
</body>
</html>
