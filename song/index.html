<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Modern 3D 17-Face Carousel</title>
    <style>
        body {
            margin: 0;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background 0.3s;
        }

        .close-btn:hover { background: rgba(255, 0, 0, 0.5); }

        .progress-wrapper {
            position: absolute;
            top: 40px;
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar {
            width: 5.88%; 
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #9d50bb);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
            transition: width 0.5s ease-out;
        }

        .progress-text {
            color: white;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* 3D Scene Adjustments */
        .scene {
            width: 160px; /* Smaller tiles */
            height: 160px;
            /* Perspective reduced to 800px to make the 3D depth more "deceptive" and aggressive */
            perspective: 800px; 
            margin-top: 20px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Added a slight tilt for better 3D visualization */
            transform: rotateX(-15deg);
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .face {
            position: absolute;
            width: 140px; 
            height: 140px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 10px rgba(255,255,255,0.05);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible; /* Back images now visible in the wheel */
            border-radius: 6px;
        }

        /* 
           Calculation for 17 faces:
           Angle = 360 / 17 ≈ 21.176deg
           Distance (translateZ) = (width/2) / tan(PI / 17)
           Distance = 70 / tan(10.588deg) ≈ 375px 
        */
        .f1  { transform: rotateY(calc(21.176deg * 0))  translateZ(375px); background-image: url('1.gif'); }
        .f2  { transform: rotateY(calc(21.176deg * 1))  translateZ(375px); background-image: url('2.jpg'); }
        .f3  { transform: rotateY(calc(21.176deg * 2))  translateZ(375px); background-image: url('3.gif'); }
        .f4  { transform: rotateY(calc(21.176deg * 3))  translateZ(375px); background-image: url('4.gif'); }
        .f5  { transform: rotateY(calc(21.176deg * 4))  translateZ(375px); background-image: url('5.gif'); }
        .f6  { transform: rotateY(calc(21.176deg * 5))  translateZ(375px); background-image: url('6.gif'); }
        .f7  { transform: rotateY(calc(21.176deg * 6))  translateZ(375px); background-image: url('7.gif'); }
        .f8  { transform: rotateY(calc(21.176deg * 7))  translateZ(375px); background-image: url('8.gif'); }
        .f9  { transform: rotateY(calc(21.176deg * 8))  translateZ(375px); background-image: url('9.jpg'); }
        .f10 { transform: rotateY(calc(21.176deg * 9))  translateZ(375px); background-image: url('10.jpg'); }
        .f11 { transform: rotateY(calc(21.176deg * 10)) translateZ(375px); background-image: url('11.jpg'); }
        .f12 { transform: rotateY(calc(21.176deg * 11)) translateZ(375px); background-image: url('12.jpg'); }
        .f13 { transform: rotateY(calc(21.176deg * 12)) translateZ(375px); background-image: url('13.jpg'); }
        .f14 { transform: rotateY(calc(21.176deg * 13)) translateZ(375px); background-image: url('14.jpg'); }
        .f15 { transform: rotateY(calc(21.176deg * 14)) translateZ(375px); background-image: url('15.jpg'); }
        .f16 { transform: rotateY(calc(21.176deg * 15)) translateZ(375px); background-image: url('16.jpg'); }
        .f17 { transform: rotateY(calc(21.176deg * 16)) translateZ(375px); background-image: url('17.jpg'); }
        
        .swipe-helper {
            display: flex;
            align-items: center;
            gap: 60px;
            margin-top: 50px;
            z-index: 10;
        }

        .arrow {
            color: white;
            font-size: 24px;
            opacity: 0.4;
            animation: pulseArrow 2s infinite ease-in-out;
            user-select: none;
        }

        @keyframes pulseArrow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .instruction {
            margin-top: 10px;
            color: #00d2ff;
            opacity: 0.6;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <button class="close-btn" onclick="closeSubProgram()">×</button>

    <div class="progress-wrapper">
        <div class="progress-text">PORTAL <span id="faceNum">1</span> / 17</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="scene">
        <div class="cube" id="cube">
            <div class="face f1"></div>
            <div class="face f2"></div>
            <div class="face f3"></div>
            <div class="face f4"></div>
            <div class="face f5"></div>
            <div class="face f6"></div>
            <div class="face f7"></div>
            <div class="face f8"></div>
            <div class="face f9"></div>
            <div class="face f10"></div>
            <div class="face f11"></div>
            <div class="face f12"></div>
            <div class="face f13"></div>
            <div class="face f14"></div>
            <div class="face f15"></div>
            <div class="face f16"></div>
            <div class="face f17"></div>
        </div>
    </div>

    <div class="swipe-helper">
        <div class="arrow arrow-left">◀</div>
        <div class="arrow arrow-right">▶</div>
    </div>
    <div class="instruction">Swipe to Explore</div>

    <script>
        const cube = document.getElementById('cube');
        const progressBar = document.getElementById('progressBar');
        const faceNumDisplay = document.getElementById('faceNum');
        
        let currentStep = 0;
        let startX = 0;
        let isDragging = false;
        const totalFaces = 17;
        const angleStep = 360 / 17;

        // Audio setup for 17 files
        const audios = Array.from({ length: totalFaces }, (_, i) => {
            const a = new Audio(`${i + 1}.mp3`);
            return a;
        });

        function closeSubProgram() {
            window.parent.postMessage('close', '*'); 
            window.close();
        }

        function updateUI(index) {
            let normalized = ((index % totalFaces) + totalFaces) % totalFaces;
            let faceIndex = normalized + 1;
            progressBar.style.width = `${(faceIndex / totalFaces) * 100}%`;
            faceNumDisplay.innerText = faceIndex;
        }

        function playFaceAudio(index) {
            audios.forEach(a => { a.pause(); a.currentTime = 0; });
            let normalized = ((index % totalFaces) + totalFaces) % totalFaces;
            if(audios[normalized]) audios[normalized].play().catch(() => {});
        }

        function rotateCube(direction) {
            if (direction === 'left') currentStep++;
            else currentStep--;
            
            // Maintain tilt and rotate
            cube.style.transform = `rotateX(-15deg) rotateY(${currentStep * -angleStep}deg)`;
            
            playFaceAudio(currentStep);
            updateUI(currentStep);
        }

        const handleStart = (e) => {
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            isDragging = true;
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 30) { 
                rotateCube(diff > 0 ? 'left' : 'right');
            }
            isDragging = false;
        };

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchend', handleEnd);

        updateUI(0);
    </script>
</body>
</html>
