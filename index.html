<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Media Portal</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff0055;
            --glass: rgba(20, 20, 20, 0.95);
            --border: rgba(255, 255, 255, 0.2);
            --sidebar-width: 200px; /* Widened by 25% */
        }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            overflow: hidden; color: white;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg3.gif') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.3; /* Opacity at 0.7 */
            z-index: -1;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            position: fixed; left: 0; top: 0; height: 100%; 
            width: var(--sidebar-width); 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border-right: 4px solid var(--accent); /* Visible Line */
            z-index: 9998; 
            /* Start hidden: shifted left exactly by its width minus a tiny sliver for the line */
            transform: translateX(calc(-1 * var(--sidebar-width))); 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #sidebar.open { transform: translateX(0); }
        
        #menu-tongue { 
            position: absolute; 
            right: -48px; /* Protrudes outside the sidebar */
            top: 75%; transform: translateY(-50%); 
            width: 48px; height: 100px; 
            background: var(--accent); 
            border-radius: 0 20px 20px 0; 
            display: flex; align-items: center; 
            justify-content: center; cursor: pointer; 
            box-shadow: 5px 0 15px rgba(255, 0, 85, 0.4);
            z-index: 9999;
        }
        #menu-tongue span { writing-mode: vertical-rl; font-weight: 900; color: white; font-size: 14px; }
        
        /* --- EQUAL SPACING BUTTONS --- */
        .merged-group { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            padding: 10px; 
            box-sizing: border-box;
            gap: 10px; 
        }
        
        .img-btn { 
            width: 100%; 
            flex: 1; /* All buttons take equal height */
            border: 1px solid var(--border); 
            border-radius: 12px; 
            cursor: pointer; 
            background-size: cover; 
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        
        /* TINY MARGIN AT BOTTOM */
        .img-btn:last-child { margin-bottom: 5px; }

        .btn-label { color: white; font-size: 12px; font-weight: 900; background: rgba(0,0,0,0.6); width: 100%; text-align: center; text-transform: uppercase; }

        /* --- VIDEO POPUP --- */
        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        #video-popup {
            position: relative; width: 85%; max-width: 450px; background: #000;
            border: 3px solid var(--border); border-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden;
            transform: scale(0.8); transition: 0.3s;
        }
        #video-overlay.active #video-popup { transform: scale(1); }
        
        .close-popup {
            position: absolute; top: 20px; right: 20px; width: 55px; height: 55px;
            background: #fff; border: none; color: #000; font-size: 30px;
            cursor: pointer; border-radius: 50%; z-index: 10005;
            display: flex; align-items: center; justify-content: center;
        }

        .video-bar { position: fixed; top: 0; right: 0; display: flex; z-index: 9997; height: 50px; background: rgba(0,0,0,0.5); }
        .vid-btn { width: 110px; height: 50px; background: transparent; border: none; border-left: 1px solid var(--border); color: white; cursor: pointer; font-weight: bold; }
        #heart-btn { position: fixed; bottom: 20px; right: 20px; font-size: 45px; cursor: pointer; z-index: 9999; }
        #main-viewport { position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); border: none; display: none; z-index: 1; background: #000; }
    </style>
</head>
<body>

    <!-- VIDEO POPUP -->
    <div id="video-overlay" onclick="closePopup()">
        <div id="video-popup" onclick="event.stopPropagation()">
            <button class="close-popup" onclick="closePopup()">✕</button>
            <video id="popup-video-player" playsinline><source src="" type="video/mp4"></video>
            <div style="padding:25px; background:#111;">
                <input type="range" id="seekbar" value="0" step="0.1" style="width:100%; accent-color: var(--accent);">
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-top:8px;">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="heart-btn" onclick="sendLikeEmail()">❤️</div>

    <div class="video-bar">
        <button class="vid-btn" onclick="playPopupVideo('vid1.mp4')">Trailer 1</button>
        <button class="vid-btn" onclick="playPopupVideo('vid2.mp4')">Trailer 2</button>
        <button class="vid-btn" onclick="playPopupVideo('vid3.mp4')">Ebooks</button>
    </div>

    <div id="sidebar">
        <!-- Tongue is inside the sidebar so it moves WITH the sidebar -->
        <div id="menu-tongue" onclick="toggleSidebar(event)"><span>MENU</span></div>
        <div class="merged-group">
            <div class="img-btn" style="background-image: url('1.gif');" onclick="loadPage('share/index.html')"><div class="btn-label">Share</div></div>
            <div class="img-btn" style="background-image: url('2.gif');" onclick="loadPage('song/index.html')"><div class="btn-label">Song</div></div>
            <div class="img-btn" style="background-image: url('3.jpg');" onclick="loadPage('willy/index.html')"><div class="btn-label">Willy</div></div>
            <div class="img-btn" style="background-image: url('4.jpg');" onclick="loadPage('professor/index.html')"><div class="btn-label">Professor</div></div>
            <div class="img-btn" style="background-image: url('5.gif');" onclick="loadPage('missingyou/index.html')"><div class="btn-label">Missing</div></div>
            <div class="img-btn" style="background-image: url('6.jpg');" onclick="loadPage('new/index.html')"><div class="btn-label">Revenge</div></div>
            <div class="img-btn" style="border-color:red" onclick="openLocked()"><div class="btn-label" style="color:red">LOCKED</div></div>
        </div>
    </div>

    <iframe id="main-viewport"></iframe>
<style>
@charset "UTF-8";
@import url(https://fonts.googleapis.com/css?family=Nunito+Sans:300,400,600,700,800);

/* Property registration for animation */
@property --item-rotateY {
  syntax: "<angle>";
  inherits: true;
  initial-value: 0deg;
}

/* Container styling */
.wheel-container {
    margin-left: 5%; /* 5% margin gap for auto-hidden menu */
    height: 120vh;
    display: grid;
    place-items: center;
    background: transparent; /* Fully transparent background */
    overflow: hidden;
}

.wheel-list {
    --n: 10; /* Number of items */
    --duration: 30s;
    --caro-tiltZ: 45deg;
    --caro-tiltX: 4deg;
    --caro-max-radius: 58em;
    /* Responsive radius based on screen width */
    --caro-radius: min(35vw, var(--caro-max-radius));
    --caro-omtrek: calc(2 * 3.141592653589793 * var(--caro-radius));
    
    /* Variable width calculations */
    --item-spacing: 0.7;
    --item-size-bruto: calc(var(--caro-omtrek) / var(--n));
    --item-size-netto: calc(var(--item-size-bruto) / (1 + var(--item-spacing)));
    
    --item-tiltX: 15deg;
    
    margin: 0;
    padding: 0;
    list-style-type: none;
    display: grid;
    perspective: 120vw;
    transform-style: preserve-3d;
    opacity: 1.0; /* Whole wheel opacity */
}

/* Individual Item Animation & Positioning */
.wheel-item {
    grid-area: 1/1;
    width: var(--item-size-netto);
    /* Set index variables for timing */
    --delay: calc(var(--duration) / var(--n) * var(--i) - var(--duration));
    
    transform:
        rotateZ(var(--caro-tiltZ))
        rotateX(var(--caro-tiltX))
        rotateY(var(--item-rotateY))
        translateZ(var(--caro-radius))
        rotateX(var(--item-tiltX));
    
    animation: item-rotateY var(--duration) var(--delay) infinite linear;
}

/* Child indices for timing */
.wheel-item:nth-child(1) { --i:1; }
.wheel-item:nth-child(2) { --i:2; }
.wheel-item:nth-child(3) { --i:3; }
.wheel-item:nth-child(4) { --i:4; }
.wheel-item:nth-child(5) { --i:5; }
.wheel-item:nth-child(6) { --i:6; }
.wheel-item:nth-child(7) { --i:7; }
.wheel-item:nth-child(8) { --i:8; }
.wheel-item:nth-child(9) { --i:9; }
.wheel-item:nth-child(10) { --i:10; }

@keyframes item-rotateY {
    100% { --item-rotateY: 360deg; }
}

/* Image Styling: 3D Border & Shadows */
.wheel-img {
    height: 120px;
    width: 75px; /* Spans the width of the variable LI */
    object-fit: cover;
    display: block;
    
    /* 3D Border & Deep Shadows */
    border: 4px solid #1a1a1a; /* Thick dark border */
    border-radius: 8px;
    box-shadow: 
        10px 20px 30px rgba(0,0,0,0.5), 
        -2px -2px 5px rgba(255,255,255,0.05); 
        
    /* Maintain the transparent fade mask */
    mask: linear-gradient(60deg, transparent, red);
    -webkit-mask: linear-gradient(60deg, transparent, red);
}
</style>

<section class="wheel-container">
    <ul class="wheel-list">
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpCmX.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpzLG.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpxXs.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpoIn.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpTBf.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpArl.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lp522.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lp77S.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpYk7.jpg" alt="" /></li>
        <li class="wheel-item"><img class="wheel-img" src="https://iili.io/B6lpap9.jpg" alt="" /></li>
    </ul>
</section>
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('video-overlay');
        const video = document.getElementById('popup-video-player');
        const seekbar = document.getElementById('seekbar');

        function toggleSidebar(e) {
            e.stopPropagation();
            sidebar.classList.toggle('open');
        }

        function playPopupVideo(src) {
            video.src = src;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            video.play();
        }

        function closePopup() {
            overlay.classList.remove('active');
            video.pause();
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        video.ontimeupdate = () => {
            const p = (video.currentTime / video.duration) * 100;
            seekbar.value = p || 0;
            document.getElementById('current-time').innerText = formatTime(video.currentTime);
            document.getElementById('duration').innerText = formatTime(video.duration || 0);
        };

        seekbar.oninput = () => { video.currentTime = (seekbar.value / 100) * video.duration; };

        function formatTime(s) {
            let m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        function loadPage(url) {
            const vp = document.getElementById('main-viewport');
            vp.src = url; vp.style.display = 'block';
            sidebar.classList.remove('open');
        }

        function openLocked() {
            if(prompt("Enter PIN:") === "1111") loadPage('interactive/index.html');
        }

        function sendLikeEmail() {
            const h = document.getElementById('heart-btn');
            h.innerText = '💖'; setTimeout(() => h.innerText = '❤️', 2000);
        }

        // Auto-close menu when clicking the screen
        window.onclick = (e) => {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        };
    </script>
</body>
</html>
