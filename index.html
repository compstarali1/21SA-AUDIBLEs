<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Portal</title>
    <style>
        :root {
            --frost: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.6);
            --accent: #00f2ff;
            --sidebar-width: 139px; /* Reduced by 10% */
            --top-bar-height: 50px;
        }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', sans-serif;
            background-color: black;
            overflow: hidden;
            color: white;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg2.gif') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.4;
            z-index: -1;
        }

        /* Sidebar container */
        #sidebar {
            position: fixed; 
            left: calc(-1 * var(--sidebar-width)); /* Hidden off-screen */
            top: 0; height: 100%; width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-right: 5px solid var(--accent);
            display: flex; flex-direction: column;
            padding: 5px 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2002; /* Higher than iframe */
            gap: 3px;
        }
        #sidebar.open { transform: translateX(var(--sidebar-width)); }

        /* The TONGUE attached to the Sidebar */
        #menu-tongue {
            position: absolute; 
            right: -41px; /* Sticks out to the right of the sidebar edge */
            top: 50%; transform: translateY(-50%);
            width: 36px; height: 80px; 
            background: #000; border: 1px solid var(--accent);
            border-left: none; border-radius: 0 50px 50px 0;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
        }
        #menu-tongue span { writing-mode: vertical-rl; font-weight: bold; color: var(--accent); font-size: 11px; }

        .merged-group {
            display: flex; flex-direction: column;
            flex-grow: 1; gap: 3px; height: 100%;
        }

        .img-btn {
            width: 135px; margin: 0 auto;
            flex-grow: 1; border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; overflow: hidden;
            background-size: 150px 75px; /* Dimensions kept exactly the same */
            background-repeat: no-repeat; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .locked-btn { flex-grow: 1; background-image: url('X.png'); border-color: #ff4d4d; }

        .btn-label {
            color: white; font-size: 14px; font-weight: 900;
            text-transform: uppercase; text-align: center;
            text-shadow: 0 0 10px black, 0 0 15px black, 0 0 5px var(--accent);
            pointer-events: none; width: 100%;
        }

        .video-bar { position: fixed; top: 0; right: 0; display: flex; z-index: 2005; height: var(--top-bar-height); }
        .vid-btn { width: 90px; height: var(--top-bar-height); background: var(--frost); backdrop-filter: blur(10px); border: 1px solid var(--border); color: white; cursor: pointer; }

        #main-viewport { position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); border: none; z-index: 1; display: none; }
    </style>
</head>
<body>

    <div class="video-bar">
        <button class="vid-btn" onclick="openVideo('vid1.mp4')">trailer1 Book</button>
        <button class="vid-btn" onclick="openVideo('vid2.mp4')">trailer2</button>
        <button class="vid-btn" onclick="openVideo('vid3.mp4')">Missing-You Ebooks</button>
    </div>

    <!-- Sidebar now contains the tongue inside it -->
    <div id="sidebar">
        <div id="menu-tongue" onclick="toggleSidebar()">
            <span>MENU</span>
        </div>
        
        <div class="merged-group">
            <div class="img-btn" style="background-image: url('1.gif');" onclick="loadPage('share/index.html')">
                <div class="btn-label">Share Media</div>
            </div>
            <div class="img-btn" style="background-image: url('2.gif');" onclick="loadPage('song/index.html')">
                <div class="btn-label">Song Ind</div>
            </div>
            <div class="img-btn" style="background-image: url('3.jpg');" onclick="loadPage('willy/index.html')">
                <div class="btn-label">Wet Willy</div>
            </div>
            <div class="img-btn" style="background-image: url('4.jpg');" onclick="loadPage('professor/index.html')">
                <div class="btn-label">Professor</div>
            </div>
            <div class="img-btn" style="background-image: url('5.gif');" onclick="loadPage('missingyou/index.html')">
                <div class="btn-label">Missing You</div>
            </div>
            <div class="img-btn" style="background-image: url('6.jpg');" onclick="loadPage('new/index.html')">
                <div class="btn-label">Wet Revenge</div>
            </div>
            <div class="img-btn locked-btn" onclick="openLocked()">
                <div class="btn-label" style="color:#ff4d4d">LOCKED</div>
            </div>
        </div>
    </div>

    <iframe id="main-viewport"></iframe>
    <button id="reset-btn" style="display:none; position:fixed; top:10px; left:10px; z-index:2006; background:red; color:white; border:none; padding:10px; border-radius:5px;" onclick="resetPage()">CLOSE [X]</button>

    <script>
        const sidebar = document.getElementById('sidebar');
        const viewport = document.getElementById('main-viewport');
        const resetBtn = document.getElementById('reset-btn');

        // This function toggles the menu: if open it closes, if closed it opens
        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }

        function loadPage(url) {
            viewport.src = url;
            viewport.style.display = 'block';
            resetBtn.style.display = 'block';
            sidebar.classList.remove('open');
        }

        function resetPage() {
            viewport.src = "";
            viewport.style.display = 'none';
            resetBtn.style.display = 'none';
        }

        function openLocked() {
            let pin = prompt("Enter PIN:");
            if(pin === "1234") loadPage('interactive/index.html');
        }

        // Close if clicking anywhere outside the sidebar (even if iframe is active)
        window.addEventListener('click', function(e) {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
    </script>
</body>
</html>
