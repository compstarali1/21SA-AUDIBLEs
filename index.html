<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --frost: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.8);
            --accent: #00f2ff;
            --sidebar-width: 154px;
            --top-bar-height: 50px;
        }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', sans-serif;
            background-color: black;
            overflow: hidden;
            color: white;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.gif') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.3;
            z-index: -1;
        }

        #main-viewport {
            position: fixed; 
            top: var(--top-bar-height);
            left: 0; width: 100%; 
            height: calc(100% - var(--top-bar-height)); 
            border: none; z-index: 1;
            background: transparent;
            display: none;
        }

        #reset-btn {
            position: fixed; top: 10px; left: 60px;
            z-index: 100; padding: 10px 15px;
            background: red; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-weight: bold;
            display: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .video-bar {
            position: fixed; top: 0; right: 0;
            display: flex; z-index: 100;
            height: var(--top-bar-height);
        }

        .vid-btn {
            width: 90px; height: var(--top-bar-height);
            background: var(--frost);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: white; font-weight: bold; cursor: pointer;
            border-top: none; transition: 0.3s;
        }
        .vid-btn:hover { background: var(--accent); color: black; }

        /* Updated Tongue: 10% narrower (36px), Black color */
        #menu-tongue {
            position: fixed; left: 0; top: 50%;
            transform: translateY(-50%);
            width: 36px; /* 10% smaller than 40px */
            height: 80px;
            background: #000000; /* Black background */
            border: 1px solid var(--accent); /* Thin cyan border for contrast */
            border-left: none;
            border-radius: 0 50px 50px 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1001;
            box-shadow: 2px 0 10px rgba(0,0,0,0.8);
        }
        
        /* High contrast Cyan text on Black background */
        #menu-tongue span { 
            writing-mode: vertical-rl; 
            font-weight: bold; 
            color: var(--accent); 
            font-size: 11px; 
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.5);
        }

        #sidebar {
            position: fixed; left: calc(-1 * var(--sidebar-width));
            top: 0; height: 100%; width: var(--sidebar-width);
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('bg.jpg');
            background-size: cover;
            border-right: 5px solid var(--accent);
            display: flex; flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1002;
        }
        #sidebar.open { transform: translateX(var(--sidebar-width)); }

        .btn-frost {
            width: 85%; padding: 12px 5px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 10px; color: white;
            font-weight: 900; cursor: pointer;
            text-shadow: 2px 2px 4px black;
            transition: 0.3s;
        }
        .btn-frost:hover { border-color: var(--accent); transform: scale(1.05); }

        .red-glow {
            background: radial-gradient(circle, rgba(255,0,0,0.4), rgba(70,0,0,0.8));
            border-color: #ff4d4d;
        }
        .red-glow:hover {
            box-shadow: 0 0 15px #ff0000;
            border-color: white;
        }

        #video-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .video-container { width: 90%; position: relative; }
        .video-container video { width: 100%; height: auto; border: 2px solid var(--accent); }
        .close-vid {
            position: absolute; top: -50px; right: 0;
            color: white; font-size: 40px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body onclick="instantClose(event)">

    <button id="reset-btn" onclick="resetPage()">CLOSE PAGE [X]</button>
    <iframe id="main-viewport" src=""></iframe>

    <div class="video-bar">
        <button class="vid-btn" onclick="openVideo('vid1.mp4')">VID 1</button>
        <button class="vid-btn" onclick="openVideo('vid2.mp4')">VID 2</button>
        <button class="vid-btn" onclick="openVideo('vid3.mp4')">VID 3</button>
    </div>

    <div id="menu-tongue" onmouseover="openSidebar()">
        <span>MENU</span>
    </div>

    <div id="sidebar" onmouseleave="startTimer()" onmouseenter="clearTimer()">
        <button class="btn-frost" onclick="loadPage('share/index.html')">Share Media</button>
        <button class="btn-frost" onclick="loadPage('song/index.html')">Song-Cube</button>
        <button class="btn-frost" onclick="loadPage('willy/index.html')">Wet-willy</button>
        <button class="btn-frost" onclick="loadPage('professor/index.html')">Professor</button>
        <button class="btn-frost" onclick="loadPage('missingyou/index.html')">Missing-You</button>
        <button class="btn-frost" onclick="loadPage('new/index.html')">New Recruit</button>
        <button class="btn-frost red-glow" onclick="openLocked()">[ X ] LOCKED</button>
    </div>

    <div id="video-modal">
        <div class="video-container">
            <span class="close-vid" onclick="closeVideo()">×</span>
            <video id="vid-player" controls>
                <source id="vid-src" src="" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const viewport = document.getElementById('main-viewport');
        const resetBtn = document.getElementById('reset-btn');
        let hideTimer;

        function openSidebar() { sidebar.classList.add('open'); clearTimer(); }
        function closeSidebar() { sidebar.classList.remove('open'); }
        
        function instantClose(e) {
            if (!sidebar.contains(e.target) && !document.getElementById('menu-tongue').contains(e.target)) {
                closeSidebar();
            }
        }

        function startTimer() { hideTimer = setTimeout(closeSidebar, 3000); }
        function clearTimer() { clearTimeout(hideTimer); }

        function loadPage(url) {
            viewport.src = url;
            viewport.style.display = 'block';
            resetBtn.style.display = 'block';
            closeSidebar();
        }

        function resetPage() {
            viewport.src = "";
            viewport.style.display = 'none';
            resetBtn.style.display = 'none';
        }

        function openVideo(src) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('vid-player');
            document.getElementById('vid-src').src = src;
            player.load();
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('vid-player').pause();
        }

        function openLocked() {
            let pin = prompt("Enter PIN:");
            if(pin === "1234") loadPage('interactive/index.html');
        }
    </script>
</body>
</html>
