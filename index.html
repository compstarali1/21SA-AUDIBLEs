<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>TITAN | Ultimate Media Hub</title>
    <style>
        :root {
            --bg: #02020250;
            --accent: #ff0055;
            --glass: rgba(5, 5, 5, 0.95);
            --border: rgba(255, 255, 255, 0.2);
            --sidebar-width: 65vw; /* Reduced width for better visibility */
            --max-sidebar: 240px; /* Slimmer desktop profile */
            --glow: 0 0 20px rgba(255, 0, 85, 0.5);
            --font-main: 'Segoe UI', Roboto, sans-serif;
        }

        @property --item-rotateY { syntax: "<angle>"; inherits: true; initial-value: 0deg; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: var(--font-main);
            background-color: var(--bg);
            overflow: hidden; color: white;
        }

        /* --- BACKGROUND LAYERS --- */
        #bg-canvas { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -2; }
        #bg-gif-overlay {
            position: fixed; inset: 0;
            background: url('bg3.gif') no-repeat center center;
            background-size: cover; opacity: 0.4; z-index: -1;
        }

        /* --- TOP VIDEO BAR --- */
        .video-bar { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 10005; }
        .vid-btn { 
            padding: 10px 18px; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 30px; color: white; 
            cursor: pointer; font-weight: 800; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
        }
        .vid-btn:hover { background: var(--accent); transform: scale(1.1); box-shadow: var(--glow); }

        /* --- PERSISTENT SIDEBAR (SLIMMER) --- */
        #sidebar { 
            position: fixed; left: 0; top: 0; height: 100%; 
            width: var(--sidebar-width); max-width: var(--max-sidebar);
            background: var(--glass); backdrop-filter: blur(40px); 
            border-right: 3px solid var(--accent); z-index: 100000;
            box-shadow: 25px 0 60px rgba(0,0,0,1);
            transform: translateX(calc(-100% + 5px)); 
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #sidebar.open { transform: translateX(0); }
        
        #menu-tongue { 
            position: absolute; right: -55px; top: 50%; transform: translateY(-50%); 
            width: 55px; height: 140px; background: #000; border: 2px solid var(--accent);
            border-left: none; clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 100001;
        }
        #menu-tongue span { 
            writing-mode: vertical-rl; font-weight: 900; 
            color: #fff; text-shadow: 0 0 10px var(--accent);
            font-size: 14px; letter-spacing: 4px; 
        }
        
        .merged-group { display: flex; flex-direction: column; height: 100%; padding: 25px 15px; box-sizing: border-box; gap: 10px; }
        .img-btn { 
            width: 100%; flex: 1; border: 2px solid var(--border); border-radius: 6px; 
            cursor: pointer; background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; transition: 0.3s; overflow: hidden; 
        }
        .img-btn:hover { border-color: var(--accent); filter: brightness(1.2); }
        
        /* EXTREMELY TRANSPARENT TEXT CARDS */
        .btn-label { 
            color: rgba(255,255,255,0.7); /* Faded text */
            font-size: 10px; font-weight: 900; 
            background: rgba(0,0,0,0.15); /* Minimal background visibility */
            width: 100%; text-align: center; padding: 8px 0; text-transform: uppercase; 
            backdrop-filter: blur(2px);
        }

        /* --- 3D WHEEL --- */
        .wheel-container { position: absolute; inset: 0; display: grid; place-items: center; z-index: 1; pointer-events: none; }
        .wheel-list {
            --n: 15; --duration: 45s; --caro-radius: min(38vw, 38vh); 
            display: grid; perspective: 1500px; transform-style: preserve-3d;
            pointer-events: auto; transform: rotateX(8deg);
        }

        @media (min-width: 900px) {
            .wheel-list { --caro-radius: 450px; }
            .wheel-img { height: 200px !important; width: 140px !important; }
        }

        .wheel-item {
            grid-area: 1/1; transform: rotateY(var(--item-rotateY)) translateZ(var(--caro-radius));
            animation: item-rotateY var(--duration) calc(var(--duration)/var(--n)*var(--i) - var(--duration)) infinite linear;
            transform-style: preserve-3d;
        }
        @keyframes item-rotateY { 0% { --item-rotateY: 0deg; } 100% { --item-rotateY: 360deg; } }
        
        .wheel-img { 
            height: 130px; width: 95px; object-fit: cover; border-radius: 8px; 
            border: 2px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: rotateY(calc(var(--item-rotateY) * -1));
        }
        .wheel-img:hover { 
            transform: rotateY(calc(var(--item-rotateY) * -1)) scale(1.5) translateZ(120px); 
            border-color: var(--accent); box-shadow: var(--glow); 
        }

        /* --- FULL SCREEN VIEWPORT --- */
        #main-viewport { 
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            border: none; display: none; z-index: 5000; background: #000;
        }

        /* --- VIDEO MODAL --- */
        #video-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(25px);
            z-index: 110000; display: none; align-items: center; justify-content: center; padding-top: 60px;
        }
        #video-popup { width: 95%; max-width: 600px; border: 2px solid var(--accent); border-radius: 12px; background: #000; overflow: hidden; position: relative; }
        .close-popup {
            position: absolute; top: 10px; right: 10px; width: 40px; height: 40px;
            background: rgba(255, 0, 85, 0.9); border: none; color: white; border-radius: 50%;
            cursor: pointer; z-index: 110005; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }

        #heart-btn { position: fixed; bottom: 25px; right: 25px; font-size: 45px; cursor: pointer; z-index: 100005; }
    </style> 
</head> 
<body> 
    <div id="bg-canvas"></div>
    <div id="bg-gif-overlay"></div>

    <div id="video-overlay" onclick="closePopup()"> 
        <div id="video-popup" onclick="event.stopPropagation()"> 
            <button class="close-popup" onclick="closePopup()">✕</button> 
            <video id="popup-video-player" playsinline style="width:100%; display:block;"></video> 
            <div style="padding:15px; background: #111;"> 
                <input type="range" id="seekbar" value="0" step="0.1" style="width:100%; accent-color: var(--accent);"> 
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top:10px;"> 
                    <span id="current-time">0:00</span> <span id="duration">0:00</span> 
                </div> 
            </div> 
        </div> 
    </div> 

    <div id="heart-btn" onclick="sendLikeEmail()">❤️</div> 

    <div class="video-bar"> 
        <button class="vid-btn" onclick="playPopupVideo('vid1.mp4')">Trailer 1</button> 
        <button class="vid-btn" onclick="playPopupVideo('vid2.mp4')">Trailer 2</button> 
        <button class="vid-btn" onclick="playPopupVideo('vid3.mp4')">Ebooks</button> 
    </div> 

    <div id="sidebar"> 
        <div id="menu-tongue" onclick="toggleSidebar(event)"><span>MENU</span></div> 
        <div class="merged-group"> 
            <div class="img-btn" style="background-image: url('1.gif');" onclick="loadPage('share/index.html')"><div class="btn-label">Share</div></div> 
            <div class="img-btn" style="background-image: url('2.gif');" onclick="loadPage('song/index.html')"><div class="btn-label">Song</div></div> 
            <div class="img-btn" style="background-image: url('3.jpg');" onclick="loadPage('willy/index.html')"><div class="btn-label">Willy</div></div> 
            <div class="img-btn" style="background-image: url('4.jpg');" onclick="loadPage('professor/index.html')"><div class="btn-label">Professor</div></div> 
            <div class="img-btn" style="background-image: url('5.gif');" onclick="loadPage('missingyou/index.html')"><div class="btn-label">Missing</div></div> 
            <div class="img-btn" style="background-image: url('6.jpg');" onclick="loadPage('new/index.html')"><div class="btn-label">Revenge</div></div> 
            <div class="img-btn" style="background-image: url('7.jpg'); border: 2px solid red;" onclick="openLocked()"><div class="btn-label" style="color:#ff3333;">LOCKED</div></div> 
        </div> 
    </div> 

    <section class="wheel-container"> 
        <ul class="wheel-list" id="main-wheel"></ul> 
    </section> 

    <iframe id="main-viewport"></iframe> 

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('video-overlay');
        const video = document.getElementById('popup-video-player');
        const seekbar = document.getElementById('seekbar');
        const viewport = document.getElementById('main-viewport');
        const wheel = document.getElementById('main-wheel');

        for(let i=1; i<=15; i++) {
            const li = document.createElement('li');
            li.className = 'wheel-item';
            li.style.setProperty('--i', i);
            li.innerHTML = `<img class="wheel-img" src="a${i}.jpg" onclick="playPopupVideo('vid1.mp4')">`;
            wheel.appendChild(li);
        }

        function toggleSidebar(e) { e.stopPropagation(); sidebar.classList.toggle('open'); }
        function playPopupVideo(src) { video.src = src; overlay.style.display = 'flex'; video.load(); video.play(); }
        function closePopup() { video.pause(); overlay.style.display = 'none'; }

        video.ontimeupdate = () => {
            if(!isNaN(video.duration)) {
                seekbar.value = (video.currentTime / video.duration) * 100;
                document.getElementById('current-time').innerText = formatTime(video.currentTime);
                document.getElementById('duration').innerText = formatTime(video.duration);
            }
        };
        seekbar.oninput = () => { video.currentTime = (seekbar.value / 100) * video.duration; };

        function formatTime(s) {
            let m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        function loadPage(url) {
            viewport.src = url;
            viewport.style.display = 'block';
            sidebar.classList.remove('open');
        }

        function openLocked() {
            if(prompt("ENTER PIN:") === "1111") loadPage('interactive/index.html');
        }

        function sendLikeEmail() {
            const h = document.getElementById('heart-btn');
            h.innerText = '💖'; setTimeout(() => h.innerText = '❤️', 1000);
        }

        window.onclick = (e) => {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target.id !== 'menu-tongue') {
                sidebar.classList.remove('open');
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") { viewport.style.display = 'none'; viewport.src = ""; closePopup(); }
        });
    </script> 
</body>
</html>
