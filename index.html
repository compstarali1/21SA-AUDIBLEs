<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Premium Media Portal</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0055;
            --glass: rgba(25, 25, 25, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --sidebar-width: 176px; /* Reduced by 20% from 220px */
            --glow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        @property --item-rotateY { syntax: "<angle>"; inherits: true; initial-value: 0deg; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            overflow: hidden; color: white;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg3.gif') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.4; z-index: -1;
        }

        /* --- TOP VIDEO BAR (20% Smaller buttons) --- */
        .video-bar { 
            position: fixed; top: 16px; right: 16px; 
            display: flex; gap: 8px; z-index: 10005; 
        }
        .vid-btn { 
            padding: 9px 16px; background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 24px; color: white; 
            cursor: pointer; font-weight: 700; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
            font-size: 14px; /* Font size maintained */
        }
        .vid-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: var(--glow); }

        /* --- SIDEBAR (20% Shrunk Width/Gaps) --- */
        #sidebar { 
            position: fixed; left: 0; top: 0; height: 100%; 
            width: var(--sidebar-width); 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border-right: 2px solid var(--accent);
            z-index: 10010;
            box-shadow: 16px 0 40px rgba(0,0,0,0.5);
            transform: translateX(calc(-1 * var(--sidebar-width) + 4px)); 
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #sidebar.open { transform: translateX(0); }
        
        #menu-tongue { 
            position: absolute; right: -32px; top: 50%;
            transform: translateY(-50%); 
            width: 32px; height: 58px; /* 20% Smaller height/width */
            background: #000; 
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 12px 12px 0; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10011;
        }
        #menu-tongue span { writing-mode: vertical-rl; font-weight: 900; color: white; pointer-events: none; font-size: 11px; letter-spacing: 1px;}
        
        .merged-group { display: flex; flex-direction: column; height: 100%; padding: 16px 12px; box-sizing: border-box; gap: 10px; }
        .img-btn { width: 100%; flex: 1; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; background-size: cover; background-position: center; display: flex; align-items: flex-end; transition: 0.3s; overflow: hidden; }
        .img-btn:hover { border-color: var(--accent); transform: scale(1.02); }
        .btn-label { color: white; font-size: 10px; font-weight: 800; background: rgba(0,0,0,0.7); width: 100%; text-align: center; padding: 6px 0; text-transform: uppercase; }

        /* --- 3D WHEEL (20% Smaller items) --- */
        .wheel-container { 
            position: absolute; 
            top: 10%; left: 10%; right: 10%; bottom: 10%; 
            display: grid; place-items: center; z-index: 1; pointer-events: none; 
        }
        .wheel-list {
            --n: 10; --duration: 30s; --caro-tiltZ: 65deg; --caro-tiltX: 20deg;
            --caro-radius: min(36vw, 32vh); /* Radius reduced */
            display: grid; perspective: 1000px; transform-style: preserve-3d;
            pointer-events: auto;
        }
        .wheel-item {
            grid-area: 1/1; 
            transform: rotateZ(var(--caro-tiltZ)) rotateX(var(--caro-tiltX)) rotateY(var(--item-rotateY)) translateZ(var(--caro-radius)) rotateX(15deg);
            animation: item-rotateY var(--duration) calc(var(--duration)/var(--n)*var(--i) - var(--duration)) infinite linear;
        }
        @keyframes item-rotateY { 100% { --item-rotateY: 360deg; } }
        
        .wheel-img { 
            height: 112px; width: 80px; /* 20% Smaller than 140x100 */
            object-fit: cover; border-radius: 10px; 
            border: 2px solid rgba(255,255,255,0.1); opacity: 0.8; 
            mask: linear-gradient(to top, rgba(0,0,0,0.05), white 40%); 
            -webkit-mask: linear-gradient(to top, rgba(0,0,0,0.05), white 40%); 
            transition: 0.3s;
        }
        .wheel-img:hover { opacity: 1; filter: brightness(1.2); transform: scale(1.1); }

        /* --- VIDEO POPUP (20% Smaller) --- */
        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(15px);
            z-index: 20000; display: none; align-items: center; justify-content: center;
        }
        #video-popup {
            position: relative; width: 72%; max-width: 384px; /* Reduced from 90%/480px */
            background: #000; border: 1px solid var(--border); border-radius: 32px;
            overflow: hidden; transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #video-overlay.active #video-popup { transform: scale(1); }
        
        .close-popup {
            position: absolute; top: 10%; right: 5%; width: 36px; height: 36px; /* Smaller button */
            background: rgba(255, 255, 255, 0.95); border: none; color: #000; font-size: 18px;
            cursor: pointer; border-radius: 50%; z-index: 20005; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }

        #heart-btn { position: fixed; bottom: 24px; right: 24px; font-size: 40px; cursor: pointer; z-index: 10005; }
        #main-viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; z-index: 10008; background: #000; }
    </style>
</head>
<body>

    <div id="video-overlay" onclick="closePopup()">
        <div id="video-popup" onclick="event.stopPropagation()">
            <button class="close-popup" onclick="closePopup()">✕</button>
            <video id="popup-video-player" playsinline style="width:100%;"><source src="" type="video/mp4"></video>
            <div style="padding:20px; background: #111;">
                <input type="range" id="seekbar" value="0" step="0.1" style="width:100%; accent-color: var(--accent);">
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top:8px;">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="heart-btn" onclick="sendLikeEmail()">❤️</div>

    <div class="video-bar">
        <button class="vid-btn" onclick="playPopupVideo('vid1.mp4')">Trailer 1</button>
        <button class="vid-btn" onclick="playPopupVideo('vid2.mp4')">Trailer 2</button>
        <button class="vid-btn" onclick="playPopupVideo('vid3.mp4')">Ebooks</button>
    </div>

    <div id="sidebar">
        <div id="menu-tongue" onclick="toggleSidebar(event)"><span>MENU</span></div>
        <div class="merged-group">
            <div class="img-btn" style="background-image: url('1.gif');" onclick="loadPage('share/index.html')"><div class="btn-label">Share</div></div>
            <div class="img-btn" style="background-image: url('2.gif');" onclick="loadPage('song/index.html')"><div class="btn-label">Song</div></div>
            <div class="img-btn" style="background-image: url('3.jpg');" onclick="loadPage('willy/index.html')"><div class="btn-label">Willy</div></div>
            <div class="img-btn" style="background-image: url('4.jpg');" onclick="loadPage('professor/index.html')"><div class="btn-label">Professor</div></div>
            <div class="img-btn" style="background-image: url('5.gif');" onclick="loadPage('missingyou/index.html')"><div class="btn-label">Missing</div></div>
            <div class="img-btn" style="background-image: url('6.jpg');" onclick="loadPage('new/index.html')"><div class="btn-label">Revenge</div></div>
            <div class="img-btn" style="border: 1px solid red;" onclick="openLocked()"><div class="btn-label" style="color:red">LOCKED</div></div>
        </div>
    </div>

    <section class="wheel-container">
        <ul class="wheel-list">
            <li class="wheel-item" style="--i:1"><img class="wheel-img" src="a1.jpg"></li>
            <li class="wheel-item" style="--i:2"><img class="wheel-img" src="a2.jpg"></li>
            <li class="wheel-item" style="--i:3"><img class="wheel-img" src="a3.jpg"></li>
            <li class="wheel-item" style="--i:4"><img class="wheel-img" src="a4.jpg"></li>
            <li class="wheel-item" style="--i:5"><img class="wheel-img" src="a5.jpg"></li>
            <li class="wheel-item" style="--i:6"><img class="wheel-img" src="a6.jpg"></li>
            <li class="wheel-item" style="--i:7"><img class="wheel-img" src="a7.jpg"></li>
            <li class="wheel-item" style="--i:8"><img class="wheel-img" src="a8.jpg"></li>
            <li class="wheel-item" style="--i:9"><img class="wheel-img" src="a9.jpg"></li>
            <li class="wheel-item" style="--i:10"><img class="wheel-img" src="a10.jpg"></li>
            <li class="wheel-item" style="--i:11"><img class="wheel-img" src="a11.jpg"></li>
            <li class="wheel-item" style="--i:12"><img class="wheel-img" src="a12.jpg"></li>
            <li class="wheel-item" style="--i:13"><img class="wheel-img" src="a13.jpg"></li>
            <li class="wheel-item" style="--i:14"><img class="wheel-img" src="a14.jpg"></li>
            <li class="wheel-item" style="--i:15"><img class="wheel-img" src="a15.jpg"></li>
        </ul>
    </section>

    <iframe id="main-viewport"></iframe>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('video-overlay');
        const video = document.getElementById('popup-video-player');
        const seekbar = document.getElementById('seekbar');
        const viewport = document.getElementById('main-viewport');

        function toggleSidebar(e) {
            e.stopPropagation();
            sidebar.classList.toggle('open');
        }

        function playPopupVideo(src) {
            video.src = src;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 50);
            video.play().catch(e => console.log("Playback error: ", e));
        }

        function closePopup() {
            overlay.classList.remove('active');
            video.pause();
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        video.ontimeupdate = () => {
            if(!isNaN(video.duration)) {
                seekbar.value = (video.currentTime / video.duration) * 100;
                document.getElementById('current-time').innerText = formatTime(video.currentTime);
                document.getElementById('duration').innerText = formatTime(video.duration);
            }
        };

        seekbar.oninput = () => { video.currentTime = (seekbar.value / 100) * video.duration; };

        function formatTime(s) {
            let m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        function loadPage(url) {
            viewport.src = url;
            viewport.style.display = 'block';
            sidebar.classList.remove('open');
        }

        function openLocked() {
            if(prompt("Enter PIN:") === "1111") loadPage('interactive/index.html');
        }

        function sendLikeEmail() {
            const h = document.getElementById('heart-btn');
            h.innerText = '💖'; 
            setTimeout(() => { h.innerText = '❤️'; }, 2000);
        }

        // Auto-close sidebar when clicking on the main content area
        window.onclick = (e) => {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        };

        // Prevent clicks inside the video popup from closing it via the overlay logic
        document.getElementById('video-popup').onclick = (e) => {
            e.stopPropagation();
        };
    </script>
</body>
</html>
