<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ✅ MOBILE CRITICAL: Perfect fit, no zoom, full width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* No scrollbars */
            background: #000000; /* Solid background while loading */
            position: fixed; /* Prevent mobile bounce/scrolling */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        /* ✅ FORCES IFRAME TO FILL 100% MOBILE SCREEN — NO GAPS, NO BORDERS */
        #mainFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            overflow: auto; /* Let iframe content scroll if needed */
            -webkit-overflow-scrolling: touch; /* Smooth iOS scroll */
        }
    </style>
</head>
<body>

    <!-- ✅ YOUR LINK OPENS **STRICTLY INSIDE THIS IFRAME** — NO REDIRECTS, NO PROMPTS -->
    <iframe id="mainFrame" src="https://shorturl.at/BrtRo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <script>
        // ✅ PREVENTS ANY EXTERNAL REDIRECT — FORCES EVERYTHING INSIDE IFRAME
        window.onbeforeunload = function(e) {
            e.preventDefault();
            return false;
        };

        // ✅ DOUBLE-ENSURE: Iframe is always active, never replaced
        document.getElementById('mainFrame').onload = function() {
            history.replaceState({}, document.title, window.location.href);
        };
    </script>

</body>
</html>
