<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories Collection</title>
<style>
body { 
  font-family: Arial, sans-serif; 
  margin:0;
  padding:0;
  min-height: 100vh;
  display: flex; /* Changed from "cover" to "flex" to fix layout logic */
  flex-direction: column;
  align-items: center;
  background-color: #121212; 
  color: #ffffff; 
}

/* BACKGROUND IMAGE */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('empress.jpg'); 
  background-size: cover;
  background-position: center;
  opacity: 0.3; 
  z-index: -1;
}

/* NEW CENTER BUTTON - Reduced gaps and margins by 25% */
.center-btn-container {
  display:flex;
  flex-direction: column; 
  align-items:center;
  margin-top: 38px; /* Reduced from 50px */
  gap: 225px; /* Reduced from 300px */
}

/* Reduced padding and border-radius by 25% */
.ethereal-btn{
  padding: 19px 45px; /* Reduced from 25px 60px */
  font-size: 24px; /* Font size maintained */
  font-weight:bold;
  color:#fff;
  background:linear-gradient(145deg,#9c27b0,#3f51b5);
  border:none;
  border-radius: 9px; /* Reduced from 12px */
  cursor:pointer;
  box-shadow:0 8px 15px rgba(0,0,0,0.4);
}

/* IMAGE OVERLAY - Width reduced by 25% scale factor */
.overlay {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width: 52.5%; /* Reduced from 70% */
  margin: 15px; /* Reduced from 20px */
  display:none;
  z-index:999;
}

.overlay img{
  width:100%;
  border-radius: 9px; /* Reduced from 12px */
}

/* AUDIO BOXES */
.audio-box{
  margin-top: 11px; /* Reduced from 15px */
  display:none;
}

audio {
  width: 225px; /* Reduced from 300px */
}
</style>
</head>
<body>

<marquee><h2>A Hi-Tech Love Story - Awe factor 8/10 ❤️❤️❤️💓🥹</h2></marquee>

<div class="center-btn-container">

  <!-- FIRST BUTTON GROUP -->
  <div>
    <button class="ethereal-btn" onclick="playAudio1()">Fallen Angel</button>
    <div class="audio-box" id="audioBox1">
      <audio id="audio1" controls>
        <source src="angel.mp3" type="audio/mpeg">
      
    </div>
  </div>

  <!-- SECOND BUTTON GROUP -->
  <div>
    <button class="ethereal-btn" onclick="playAudio2()">The Missing-You Syndrome</button>
    <div class="audio-box" id="audioBox2">
      <audio id="audio2" controls>
        <source src="missyou.mp3" type="audio/mpeg">
      
    </div>
  </div>

</div>

<!-- IMAGE OVERLAY -->
<div class="overlay" id="overlay">
<img src="empress.gif">
</div>

<script>
function playAudio1(){
  const audio = document.getElementById('audio1');
  const box = document.getElementById('audioBox1');
  const overlay = document.getElementById('overlay');
  
  overlay.style.display = "block";
  box.style.display = "block";
  audio.play();
}

function playAudio2(){
  const audio = document.getElementById('audio2');
  const box = document.getElementById('audioBox2');
  const overlay = document.getElementById('overlay');
  
  overlay.style.display = "block";
  box.style.display = "block";
  audio.play();
}
</script>

</body>
</html>
